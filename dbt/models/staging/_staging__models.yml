version: 2

models:
  - name: stg_ohlcv
    description: "Cleaned and typed OHLCV bars — filters out zero-close rows"
    columns:
      - name: symbol
        description: "Trading pair"
        data_tests:
          - not_null
          - accepted_values:
              values: ['BTCUSDT', 'ETHUSDT', 'SOLUSDT']
      - name: timestamp
        description: "Candle open time (UTC)"
        data_tests: [not_null]
      - name: close
        description: "Closing price"
        data_tests: [not_null]
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [symbol, timestamp]
